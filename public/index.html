<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with Spotify</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #121212;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
    }

    #app {
      background: #1e1e1e;
      border-radius: 20px;
      padding: 2rem;
      width: 500px;
      max-width: 90%;
      max-height: 90vh;
      /* limits height on large screens */
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      text-align: center;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    p {
      margin: 0.5rem 0 1rem;
      line-height: 1.5;
      color: #b0b0b0;
    }

    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin: 1rem 0 0.5rem;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #1ed760;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Spinner */
    .spinner {
      border: 4px solid #333;
      border-top: 4px solid #1db954;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin: 1.5rem auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Status messages */
    .error {
      color: #ff6b6b;
      font-weight: 500;
      margin: 1rem 0;
    }

    .progress {
      color: #ffd93d;
      margin: 1rem 0;
    }

    .result {
      color: #6bff6b;
      margin: 1rem 0;
    }

    /* Track list styling */
    .track-list {
      list-style: none;
      text-align: left;
      margin-top: 1rem;
      overflow-y: auto;
      /* scroll inside the card */
      padding-right: 0.5rem;
    }

    .track-item {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid #1db954;
    }

    .track-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .track-artists {
      font-size: 0.9rem;
      color: #b0b0b0;
      margin-bottom: 0.2rem;
    }

    .track-date {
      font-size: 0.85rem;
      color: #1db954;
      font-weight: 500;
    }

    /* subtle scrollbar for dark mode */
    .track-list::-webkit-scrollbar {
      width: 8px;
    }

    .track-list::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    .track-list::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }

    .track-list::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>

<body>
  <div id="app">
    <h1>🎧 Release Sonar</h1>
    <p>Discover new music from your favourite artists</p>
    <button id="login-button">Login with Spotify</button>
  </div>
  <script src="script.js"></script>
</body>

</html>
