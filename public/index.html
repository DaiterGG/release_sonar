<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with Spotify</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #121212;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        #app {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            min-width: 320px;
            max-width: 90%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #fff;
        }

        p {
            margin: 1rem 0;
            line-height: 1.5;
            color: #b0b0b0;
        }

        button {
            background: #1db954;
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1.5rem 0 0.5rem;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #1ed760;
        }

        button:active {
            transform: scale(0.98);
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #1db954;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ff6b6b;
            font-weight: 500;
            margin: 1rem 0;
        }

        .progress {
            color: #ffd93d;
        }

        .result {
            color: #6bff6b;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>🎧 Release Sonar</h1>
        <p>Discover new music from your favourite artists</p>
        <button id="login-button">Login with Spotify</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
